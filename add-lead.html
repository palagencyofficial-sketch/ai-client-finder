<!DOCTYPE html>
<html>
<head>
<title>Add Client Lead</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white p-10">

<h1 class="text-2xl font-bold mb-6">Add New Client Lead</h1>

<div class="space-y-4 max-w-md">

<input id="company" placeholder="Company Name"
class="w-full p-3 bg-slate-800 rounded">

<input id="need" placeholder="Service Needed"
class="w-full p-3 bg-slate-800 rounded">

<input id="budget" placeholder="Budget"
class="w-full p-3 bg-slate-800 rounded">

<input id="contact" placeholder="Email"
class="w-full p-3 bg-slate-800 rounded">

<button onclick="saveLead()"
class="bg-blue-600 px-5 py-3 rounded">
Save Lead
</button>

</div>

<script>

function saveLead(){

let company=document.getElementById("company").value
let need=document.getElementById("need").value
let budget=document.getElementById("budget").value
let contact=document.getElementById("contact").value

let lead={company,need,budget,contact}

console.log("New Lead:",lead)

alert("Lead saved (demo mode)")

}

</script>

</body>
</html>
