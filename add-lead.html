<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Lead</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">

<div class="bg-slate-900 p-8 rounded-xl w-full max-w-md">

<h1 class="text-2xl font-bold mb-6">Add New Lead</h1>

<form id="leadForm" class="space-y-4">

<input type="text" id="company" placeholder="Company Name"
class="w-full p-3 bg-slate-800 rounded-lg">

<input type="text" id="need" placeholder="Service Needed"
class="w-full p-3 bg-slate-800 rounded-lg">

<input type="text" id="budget" placeholder="Budget ($)"
class="w-full p-3 bg-slate-800 rounded-lg">

<input type="email" id="contact" placeholder="Client Email"
class="w-full p-3 bg-slate-800 rounded-lg">

<button class="w-full bg-blue-600 p-3 rounded-lg">
Add Lead
</button>

</form>

</div>

<script>

document.getElementById("leadForm").addEventListener("submit",function(e){

e.preventDefault()

let company=document.getElementById("company").value
let need=document.getElementById("need").value
let budget=document.getElementById("budget").value
let contact=document.getElementById("contact").value

let lead={
company,
need,
budget,
contact
}

let leads=JSON.parse(localStorage.getItem("leads"))||[]

leads.push(lead)

localStorage.setItem("leads",JSON.stringify(leads))

alert("Lead Added!")

})

</script>

</body>
</html>
