<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Client Finder AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:Inter,sans-serif;
}

.glass{
background:rgba(15,23,42,.6);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.05);
}

.skeleton{
background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);
background-size:200% 100%;
animation:load 1.5s infinite;
}

@keyframes load{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}

</style>

</head>


<body class="min-h-screen flex flex-col">

<!-- NAVBAR -->

<nav class="border-b border-slate-800 bg-slate-900/60">

<div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center">
🔍
</div>

<h1 class="font-bold text-xl">
Client Finder<span class="text-blue-500">.ai</span>
</h1>

</div>

<div class="bg-slate-800 w-9 h-9 rounded-full flex items-center justify-center text-blue-400 font-bold">
KP
</div>

</div>

</nav>


<!-- MAIN -->

<main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">

<h1 class="text-3xl font-bold mb-1">Lead Dashboard</h1>

<p class="text-slate-400 mb-6">
Discover and manage high-ticket AI clients.
</p>


<!-- SEARCH -->

<div class="flex gap-3 mb-6">

<input
id="searchInput"
type="text"
placeholder="Search leads..."
class="w-full max-w-xs px-4 py-2 bg-slate-900 border border-slate-700 rounded-xl text-sm"
/>

<button class="px-4 py-2 bg-slate-800 border border-slate-700 rounded-xl">
Filters
</button>

</div>


<!-- TABLE -->

<div class="glass rounded-xl overflow-hidden">

<table class="w-full">

<thead class="bg-slate-800 text-slate-400 text-sm">

<tr>

<th class="p-4 text-left">Company</th>

<th class="p-4 text-left">Need</th>

<th class="p-4 text-left">Budget</th>

<th class="p-4 text-right">Action</th>

</tr>

</thead>

<tbody id="leadTable">

<tr>
<td class="p-4"><div class="h-6 w-40 skeleton rounded"></div></td>
<td class="p-4"><div class="h-6 w-24 skeleton rounded"></div></td>
<td class="p-4"><div class="h-6 w-16 skeleton rounded"></div></td>
<td class="p-4 text-right"><div class="h-8 w-20 skeleton rounded ml-auto"></div></td>
</tr>

</tbody>

</table>

</div>

</main>



<footer class="text-center text-slate-400 py-6 border-t border-slate-800">

Designed by
<span class="text-blue-400 font-semibold">
Khokon Pal
</span>

</footer>


<script>


let allLeads=[]


function renderTable(data){

const table=document.getElementById("leadTable")

table.innerHTML=""

data.forEach((lead,index)=>{

const initial=lead.company.charAt(0)

const row=document.createElement("tr")

row.className="border-t border-slate-800 hover:bg-slate-800/40"

row.innerHTML=`

<td class="p-4">

<div class="flex items-center gap-3">

<div class="w-10 h-10 bg-slate-800 border border-slate-700 rounded-lg flex items-center justify-center font-bold text-blue-400">
${initial}
</div>

<div>

<div class="font-semibold">
${lead.company}
</div>

<div class="text-xs text-slate-500">
Verified Lead
</div>

</div>

</div>

</td>

<td class="p-4 text-purple-400">
${lead.need}
</td>

<td class="p-4 text-emerald-400 font-bold">
${lead.budget}
</td>

<td class="p-4 text-right">

<a
href="mailto:${lead.contact}"
class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm"
>
Email
</a>

</td>

`

table.appendChild(row)

})

}



const mockData=[
{company:"SaaS Startup",need:"Video Ads",budget:"$2000",contact:"marketing@startup.com"},
{company:"Ecommerce Brand",need:"Copywriting",budget:"$1500",contact:"hello@brand.com"},
{company:"AI Agency",need:"Automation Setup",budget:"$3000",contact:"contact@agency.com"}
]



fetch("leads.json")

.then(r=>r.json())

.then(data=>{
allLeads=data
renderTable(allLeads)
})

.catch(()=>{
allLeads=mockData
renderTable(allLeads)
})



document.getElementById("searchInput").addEventListener("keyup",function(){

const value=this.value.toLowerCase()

const filtered=allLeads.filter(l=>

l.company.toLowerCase().includes(value) ||
l.need.toLowerCase().includes(value)

)

renderTable(filtered)

})


</script>

</body>
</html>
