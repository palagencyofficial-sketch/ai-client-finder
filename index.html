<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Client Finder | Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#8b5cf6'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            background-image:
                radial-gradient(circle at 15% 0%, rgba(59, 130, 246, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Smooth Custom Scrollbar for Mobile Table Scrolling */
        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>

<body class="antialiased font-sans">

    <!-- Navbar -->
    <nav class="w-full border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                    <span class="font-bold text-xl tracking-wide text-white">
                        Client Finder<span class="text-blue-500">.ai</span>
                    </span>
                </div>
                <!-- Profile / Notifications -->
                <div class="flex items-center gap-4">
                    <button class="text-slate-400 hover:text-white transition hidden sm:block relative">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="absolute top-0 right-0 w-2 h-2 bg-rose-500 rounded-full"></span>
                    </button>
                    <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-sm text-blue-400">
                        KP
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

        <!-- Header & Controls -->
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
            <div>
                <h1 class="text-3xl sm:text-4xl font-bold text-white mb-2 tracking-tight">Lead Dashboard</h1>
                <p class="text-sm sm:text-base text-slate-400">
                    Discover and manage high-ticket AI clients securely.
                </p>
            </div>
            
            <!-- Search & Filter (Visual) -->
            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                <div class="relative w-full sm:w-64">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Search leads..." class="w-full pl-10 pr-4 py-2.5 bg-slate-900 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all">
                </div>
                <button class="w-full sm:w-auto flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-medium text-slate-200 transition-colors shadow-sm">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                    Filters
                </button>
            </div>
        </div>

        <!-- Table Container (Fully Responsive) -->
        <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl border border-slate-700/50">
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse whitespace-nowrap min-w-[700px]">
                    
                    <!-- Table Head -->
                    <thead>
                        <tr class="bg-slate-800/60 border-b border-slate-700/80">
                            <th class="py-4 px-4 sm:px-6 text-xs font-semibold text-slate-400 uppercase tracking-wider w-1/3">Company Profile</th>
                            <th class="py-4 px-4 sm:px-6 text-xs font-semibold text-slate-400 uppercase tracking-wider">Requirement</th>
                            <th class="py-4 px-4 sm:px-6 text-xs font-semibold text-slate-400 uppercase tracking-wider">Est. Budget</th>
                            <th class="py-4 px-4 sm:px-6 text-xs font-semibold text-slate-400 uppercase tracking-wider text-right">Action</th>
                        </tr>
                    </thead>

                    <!-- Table Body -->
                    <tbody id="leadTable" class="divide-y divide-slate-800/60">
                        <!-- Initial Loading Skeletons -->
                        <tr>
                            <td class="py-4 px-4 sm:px-6"><div class="h-10 w-48 rounded-lg skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6"><div class="h-6 w-24 rounded-full skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6"><div class="h-6 w-20 rounded-md skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6 text-right"><div class="h-9 w-28 rounded-lg skeleton ml-auto"></div></td>
                        </tr>
                        <tr>
                            <td class="py-4 px-4 sm:px-6"><div class="h-10 w-40 rounded-lg skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6"><div class="h-6 w-28 rounded-full skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6"><div class="h-6 w-24 rounded-md skeleton"></div></td>
                            <td class="py-4 px-4 sm:px-6 text-right"><div class="h-9 w-28 rounded-lg skeleton ml-auto"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Table Footer -->
            <div class="px-4 sm:px-6 py-4 border-t border-slate-800/60 bg-slate-900/30 flex items-center justify-between">
                <p class="text-xs sm:text-sm text-slate-500">Live data fetching from secure database.</p>
                <div class="flex gap-2">
                    <button class="px-3 py-1.5 rounded-md border border-slate-700 text-slate-400 hover:bg-slate-800 text-xs sm:text-sm transition-colors">Previous</button>
                    <button class="px-3 py-1.5 rounded-md border border-slate-700 text-slate-300 hover:bg-slate-800 text-xs sm:text-sm transition-colors">Next</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full text-center py-6 mt-auto border-t border-slate-800/50 bg-slate-900/30 backdrop-blur-md">
        <p class="text-sm text-slate-400">
            Designed & Developed by 
            <span class="font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-violet-400 tracking-wide">
                Khokan Pal
            </span>
        </p>
    </footer>

    <!-- Logic Script -->
    <script>
        // Default Mock Data in case leads.json is not found (Useful for local preview)
        const mockData = [
            { company: "SaaS Startup Inc.", need: "Video Ads", budget: "$2,000", contact: "marketing@startup.com" },
            { company: "E-Commerce Brand", need: "Copywriting", budget: "$1,500", contact: "hello@brand.com" },
            { company: "AI Agency LLC", need: "Automation Setup", budget: "$4,500", contact: "founder@agency.com" },
            { company: "Fitness App", need: "UGC Content", budget: "$800", contact: "collab@fitapp.com" }
        ];

        // Function to render table rows with premium design
        function renderTable(data) {
            let table = document.getElementById("leadTable");
            table.innerHTML = ""; // Clear skeletons

            data.forEach((lead, index) => {
                // Generate a random color theme for the company initial icon
                const colors = ['blue', 'violet', 'emerald', 'orange', 'rose'];
                const theme = colors[index % colors.length];
                const initial = lead.company.charAt(0).toUpperCase();

                let row = document.createElement("tr");
                row.className = "hover:bg-slate-800/40 transition-colors group";
                
                row.innerHTML = `
                    <td class="py-4 px-4 sm:px-6">
                        <div class="flex items-center gap-3">
                            <div class="h-10 w-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-${theme}-400 shadow-inner">
                                ${initial}
                            </div>
                            <div>
                                <div class="font-semibold text-slate-200">${lead.company}</div>
                                <div class="text-[11px] text-slate-500 uppercase tracking-wider mt-0.5">Verified Lead</div>
                            </div>
                        </div>
                    </td>
                    <td class="py-4 px-4 sm:px-6">
                        <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-purple-500/10 border border-purple-500/20 text-purple-400 text-xs font-medium">
                            <span class="w-1.5 h-1.5 rounded-full bg-purple-500"></span>
                            ${lead.need}
                        </span>
                    </td>
                    <td class="py-4 px-4 sm:px-6">
                        <div class="font-mono font-bold text-emerald-400 bg-emerald-500/10 px-3 py-1.5 rounded-lg inline-block border border-emerald-500/20">
                            ${lead.budget}
                        </div>
                    </td>
                    <td class="py-4 px-4 sm:px-6 text-right">
                        <a href="mailto:${lead.contact}" class="inline-flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium rounded-xl transition-all shadow-lg shadow-blue-500/20 group-hover:shadow-blue-500/40">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <span class="hidden sm:inline">Email Client</span>
                            <span class="sm:hidden">Email</span>
                        </a>
                    </td>
                `;
                table.appendChild(row);
            });
        }

        // Fetch logic
        setTimeout(() => { // Added slight timeout to show off the skeleton loading
            fetch('leads.json')
            .then(res => {
                if (!res.ok) throw new Error("File not found");
                return res.json();
            })
            .then(data => {
                renderTable(data);
            })
            .catch(err => {
                console.warn("leads.json not found. Loading demo data instead for preview.");
                renderTable(mockData);
            });
        }, 800);

    </script>
</body>
</html>
