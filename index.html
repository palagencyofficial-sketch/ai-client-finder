<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Client Finder | Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
theme:{
extend:{
fontFamily:{ sans:['Inter','sans-serif'] },
colors:{
primary:'#3b82f6',
secondary:'#8b5cf6'
}
}
}
}
</script>

<style>

body{
background-color:#020617;
color:#f8fafc;
background-image:
radial-gradient(circle at 10% 20%, rgba(59,130,246,0.05) 0%, transparent 40%),
radial-gradient(circle at 90% 80%, rgba(139,92,246,0.05) 0%, transparent 40%);
min-height:100vh;
display:flex;
flex-direction:column;
}

.glass-panel{
background:rgba(15,23,42,0.6);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.05);
}

</style>
</head>

<body class="antialiased font-sans">

<nav class="w-full border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

<div class="flex items-center justify-between h-16">

<div class="flex items-center gap-3">

<div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-white font-bold">

🔎

</div>

<span class="font-bold text-lg tracking-wide text-white">

Client Finder<span class="text-blue-500">.ai</span>

</span>

</div>

</div>

</div>

</nav>

<main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">

<div class="mb-8">

<h1 class="text-3xl font-bold text-white mb-1">Lead Dashboard</h1>

<p class="text-sm text-slate-400">

Discover and manage high-ticket AI clients.

</p>

</div>

<div class="glass-panel rounded-2xl overflow-hidden shadow-2xl">

<div class="overflow-x-auto">

<table class="w-full text-left border-collapse">

<thead>

<tr class="bg-slate-800/50 border-b border-slate-700/80">

<th class="py-4 px-6 text-xs font-semibold text-slate-400 uppercase">Company</th>

<th class="py-4 px-6 text-xs font-semibold text-slate-400 uppercase">Requirement</th>

<th class="py-4 px-6 text-xs font-semibold text-slate-400 uppercase">Budget</th>

<th class="py-4 px-6 text-xs font-semibold text-slate-400 uppercase text-right">Contact</th>

</tr>

</thead>

<tbody id="leadTable" class="divide-y divide-slate-800/60">

</tbody>

</table>

</div>

</div>

</main>

<footer class="w-full text-center py-6 mt-auto border-t border-slate-800/50 bg-slate-900/20">

<p class="text-sm text-slate-400">

Designed & Developed by

<span class="font-semibold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-violet-400">

Khokan Pal

</span>

</p>

</footer>

<script>

fetch('leads.json')
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("leadTable")

data.forEach(lead=>{

let row=document.createElement("tr")

row.className="hover:bg-slate-800/30 transition-colors"

row.innerHTML=`

<td class="py-4 px-6 font-semibold text-slate-200">${lead.company}</td>

<td class="py-4 px-6 text-purple-400">${lead.need}</td>

<td class="py-4 px-6 text-emerald-400 font-bold">${lead.budget}</td>

<td class="py-4 px-6 text-right">

<a href="mailto:${lead.contact}" class="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded-lg">

Email Client

</a>

</td>

`

table.appendChild(row)

})

})

</script>

</body>
</html>
